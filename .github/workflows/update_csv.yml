name: Actualizar CSV desde Drive

on:
  schedule:
    # Se ejecuta todos los días a las 06:00 AM UTC (03:00 AM Argentina)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite ejecutar la tarea manualmente desde la pestaña "Actions"

jobs:
  actualizar-datos:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. Obtener código del repositorio
      uses: actions/checkout@v3

    - name: 2. Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Instalar dependencias
      run: pip install requests

    - name: 4. Ejecutar script de descarga
      run: python update_data.py

    - name: 5. Subir cambios al repositorio
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Agregamos ambos archivos para que git rastree cambios en cualquiera de los dos
        git add "Prueba Tableau.csv" "Materia prima.csv"
        
        if git diff --staged --quiet; then
          echo "No se detectaron cambios nuevos en ninguno de los archivos."
        else
          git commit -m "🔄 Actualización automática de datos (Laboratorio y Materias Primas)"
          git push
          echo "Datos sincronizados y guardados en el repositorio."
        fi
